services:
  frontend:
    image: ghcr.io/cheale14/mlapibot-frontend:${IMAGE_TAG:-main}
    networks:
      - shared
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - ${PORT}:${PORT}
    env_file: ".env"
    environment:
      - PORT=${PORT}
    healthcheck:
      test: curl -f http://localhost:${PORT}/healthcheck || exit 1
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
networks:
  shared:
    name: mlapibot_shared
    external: true